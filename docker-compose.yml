services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: furnimart-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=FurniMart@2024
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database/sqlserver:/docker-entrypoint-initdb.d
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "FurniMart@2024" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - furnimart-network

  identity-service:
    build:
      context: ./backend/identity-service
      dockerfile: Dockerfile
    container_name: furnimart-identity-service
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - SQL_SERVER_HOST=sqlserver
      - SQL_SERVER_PORT=1433
      - SQL_SERVER_USER=sa
      - SQL_SERVER_PASSWORD=FurniMart@2024
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_REFRESH_SECRET=your-super-secret-refresh-jwt-key-change-in-production
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - CORS_ORIGIN=*
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - furnimart-network

  catalog-service:
    build:
      context: ./backend/catalog-service
      dockerfile: Dockerfile
    container_name: furnimart-catalog-service
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=production
      - PORT=5002
      - SQL_SERVER_HOST=sqlserver
      - SQL_SERVER_PORT=1433
      - SQL_SERVER_USER=sa
      - SQL_SERVER_PASSWORD=FurniMart@2024
      - CORS_ORIGIN=*
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - furnimart-network

  payment-after-sale-service:
    build:
      context: ./backend/payment-after-sale-service
      dockerfile: Dockerfile
    container_name: furnimart-payment-service
    ports:
      - "5003:5003"
    environment:
      - NODE_ENV=production
      - PORT=5003
      - SQL_SERVER_HOST=sqlserver
      - SQL_SERVER_PORT=1433
      - SQL_SERVER_USER=sa
      - SQL_SERVER_PASSWORD=FurniMart@2024
      - CORS_ORIGIN=*
      # VNPay config (use your actual credentials)
      - VNPAY_TMN_CODE=
      - VNPAY_HASH_SECRET=
      # MoMo config (use your actual credentials)
      - MOMO_PARTNER_CODE=
      - MOMO_ACCESS_KEY=
      - MOMO_SECRET_KEY=
      # ZaloPay config (use your actual credentials)
      - ZALOPAY_APP_ID=
      - ZALOPAY_KEY1=
      - ZALOPAY_KEY2=
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - furnimart-network

volumes:
  sqlserver_data:

networks:
  furnimart-network:
    driver: bridge
